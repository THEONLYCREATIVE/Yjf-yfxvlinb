<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#465461">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>PharmaScan Index Pro</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      /* VMED Palette 9 Integration  */
      --bg-main: #ECF3F4;
      --card-bg: #ffffff;
      --text-main: #465461;
      --text-muted: #729CA2;
      --border-color: #C4DCDF;
      --accent-teal: #729CA2;
      --accent-teal-dark: #465461;
      --status-red: #ef4444;
      --status-amber: #FF893B;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg-main);
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Combined Header Style  */
    .app-header {
      background: var(--accent-teal-dark);
      position: sticky; top: 0; z-index: 100;
      padding: 0.7rem 1rem;
      border-bottom: 1px solid rgba(114,156,162,0.25);
      color: white;
    }

    .header-inner { display: flex; align-items: center; justify-content: space-between; max-width: 1200px; margin: 0 auto; }
    
    .vmed-script { font-family: 'Dancing Script', cursive; font-size: 1.5rem; }

    /* Inventory Dashboard Elements  */
    .stats-grid {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 0.55rem; padding: 1rem;
      max-width: 1200px; margin: 0 auto;
    }

    .stat-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 0.75rem;
      text-align: center;
    }

    .stat-num { font-size: 1.1rem; font-weight: 800; color: var(--accent-teal); }

    /* Scanner & Input Section  */
    .search-section { background: var(--accent-teal-dark); padding: 0.5rem 1rem 1rem; }
    .search-input {
      width: 100%; padding: 0.8rem 1.5rem;
      border-radius: 50px; border: none; outline: none;
      font-size: 0.95rem;
    }

    /* Product Cards [cite: 1, 2] */
    .product-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 0.75rem; padding: 1rem;
    }

    .p-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 1rem;
      border-left: 4px solid var(--accent-teal);
    }

    .hidden { display: none; }
  </style>
</head>
<body>

  <header class="app-header">
    <div class="header-inner">
      <div class="header-brand">
        <span class="vmed-script">PharmaScan</span>
        <small style="display:block; font-size:0.6rem; color:var(--accent-teal);">PRO INDEX</small>
      </div>
      <div id="itemCount" class="stat-num" style="color:white; font-size:0.9rem;">0 Items</div>
    </div>
  </header>

  <div class="search-section">
    <input type="text" id="barcodeInput" class="search-input" placeholder="Scan barcode or type description..." autofocus>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-num" id="statTotal">0</div>
      <div style="font-size:0.6rem;">TOTAL</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statExpiry" style="color:var(--status-red);">0</div>
      <div style="font-size:0.6rem;">EXPIRING</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statToday">0</div>
      <div style="font-size:0.6rem;">SCANS</div>
    </div>
    <div class="stat-card">
      <div class="stat-num">AED</div>
      <div style="font-size:0.6rem;">REGION</div>
    </div>
  </div>

  <main id="productGrid" class="product-grid">
    </main>

  <script>
    // Logic integrated from your 'as.txt' file 
    const S = {
      history: [],
      master: []
    };

    const input = document.getElementById('barcodeInput');
    const grid = document.getElementById('productGrid');

    function renderItems(items) {
      grid.innerHTML = items.map(item => `
        <div class="p-card">
          <div style="display:flex; justify-content:space-between;">
            <strong style="font-size:0.9rem;">${item.description || 'Unknown Product'}</strong>
            <span style="color:var(--accent-teal); font-weight:bold;">Qty: ${item.quantity || 0}</span>
          </div>
          <div style="font-size:0.75rem; color:var(--text-muted); margin-top:0.5rem;">
            Barcode: ${item.barcode} | Expiry: ${item.expiry || 'N/A'}
          </div>
        </div>
      `).join('');
      document.getElementById('itemCount').innerText = `${items.length} Items`;
      document.getElementById('statTotal').innerText = items.length;
    }

    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        const val = input.value.trim();
        if (val) {
          // Add temporary item for demonstration 
          S.history.unshift({
            barcode: val,
            description: "New Scanned Item",
            quantity: 1,
            expiry: "2026-12",
            scanTimestamp: new Date().toISOString()
          });
          renderItems(S.history);
          input.value = '';
        }
      }
    });

    // Initial load simulation
    window.onload = () => {
      console.log("PharmaScan Pro Initialized");
    };
  </script>
</body>
</html>
